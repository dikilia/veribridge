<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VeriBridge · Link Generator</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://i.imgur.com/HF0svxe.png">
    <link rel="apple-touch-icon" href="https://i.imgur.com/HF0svxe.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes shine {
            0% { background-position: -100% 0; }
            100% { background-position: 200% 0; }
        }
        .veri-gradient {
            background: linear-gradient(135deg, #b388ff, #7c4dff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e3a8a;
            color: white;
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            z-index: 9999;
        }
        .toast.show { opacity: 1; }
        .toast.error { background: #991b1b; }
        .loading-dots::after {
            content: '';
            animation: dots 1.5s infinite;
        }
        @keyframes dots {
            0%,20%{content:'';} 40%{content:'.';} 60%{content:'..';} 80%,100%{content:'...';}
        }
        .shake {
            animation: shake 0.5s;
        }
        @keyframes shake {
            0%,100%{transform:translateX(0);}
            25%{transform:translateX(-5px);}
            75%{transform:translateX(5px);}
        }
    </style>
</head>
<body class="bg-black text-white">
    <div class="absolute inset-0 -z-10 h-full w-full bg-[radial-gradient(#0d0d0d_1px,transparent_1px)] [background-size:16px_16px]"></div>
    
    <div class="flex min-h-screen items-center justify-center p-4">
        <div class="w-full max-w-3xl">
            
            <div class="text-right mb-4">
                <a href="/admin" class="text-xs text-white/40 hover:text-white/60 transition">
                    🔐 Admin Access
                </a>
            </div>
            
            <div class="bg-black/30 backdrop-blur-sm border border-white/10 rounded-xl p-8 shadow-2xl">
                
                <div class="flex items-center justify-center gap-2 mb-4">
                    <div class="text-3xl font-bold">
                        <span class="text-white">Veri</span><span class="veri-gradient">Bridge</span>
                    </div>
                </div>
                
                <p class="text-center text-white/60 mb-2">
                    Generate verification links that never expire
                </p>
                
                <div class="text-center mb-6">
                    <div class="inline-flex flex-wrap justify-center gap-2" id="allowedDomainsTags">
                        <span class="text-xs text-white/30">Loading allowed domains...</span>
                    </div>
                </div>
                
                <div class="mb-6">
                    <label class="block text-sm font-medium text-white/80 mb-2">
                        Target Roblox URL
                    </label>
                    <input type="text" id="targetUrl" 
                           class="w-full bg-zinc-900/80 border border-white/10 rounded-lg px-4 py-3 text-white font-mono text-sm"
                           placeholder="https://www.roblox.com/login"
                           value="https://www.roblox.com/login">
                    <div id="urlError" class="text-red-400 text-xs mt-2 min-h-[20px]"></div>
                </div>
                
                <button id="generateBtn" 
                        class="w-full bg-gradient-to-r from-blue-900 to-indigo-900 hover:from-blue-800 hover:to-indigo-800 py-3 rounded-lg font-medium border border-blue-400/30 transition disabled:opacity-50 disabled:cursor-not-allowed">
                    ✨ Generate Verification Link
                </button>
                
                <div id="resultSection" class="hidden mt-6 p-4 bg-green-900/20 border border-green-500/30 rounded-lg">
                    <div class="text-sm text-green-300 mb-2">✅ Link Generated Successfully</div>
                    <div class="flex flex-col sm:flex-row gap-2">
                        <code id="generatedLink" class="flex-1 bg-black/50 px-3 py-2 rounded text-blue-200 text-sm font-mono break-all"></code>
                        <div class="flex gap-2">
                            <button id="copyBtn" class="bg-zinc-800 hover:bg-zinc-700 px-4 py-2 rounded border border-white/10 text-sm whitespace-nowrap">
                                📋 Copy
                            </button>
                            <button id="testBtn" class="bg-blue-900/60 hover:bg-blue-800 px-4 py-2 rounded border border-blue-400/30 text-sm whitespace-nowrap">
                                ↗️ Test
                            </button>
                        </div>
                    </div>
                    <p class="text-xs text-white/40 mt-3">
                        ⚡ This link never expires. Admin can manage it from dashboard.
                    </p>
                </div>
                
                <div class="mt-6 pt-4 border-t border-white/10 text-xs text-white/40 text-center">
                    Only URLs containing allowed domains can be generated
                </div>
            </div>
        </div>
    </div>
    
    <div id="toast" class="toast"></div>
    
    <script>
        const API_BASE = '/api';
        const SITE_URL = 'https://veribridge-dashboard.vercel.app';
        
        const targetUrl = document.getElementById('targetUrl');
        const urlError = document.getElementById('urlError');
        const generateBtn = document.getElementById('generateBtn');
        const resultSection = document.getElementById('resultSection');
        const generatedLink = document.getElementById('generatedLink');
        const copyBtn = document.getElementById('copyBtn');
        const testBtn = document.getElementById('testBtn');
        const toast = document.getElementById('toast');
        const allowedDomainsTags = document.getElementById('allowedDomainsTags');
        
        let allowedDomains = [];
        let lastGeneratedUrl = '';
        
        function showToast(text, isError = false) {
            toast.textContent = text;
            toast.style.background = isError ? '#991b1b' : '#1e3a8a';
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        async function loadAllowedDomains() {
            try {
                const response = await fetch(`${API_BASE}/domains`);
                const data = await response.json();
                allowedDomains = data.domains || ['roblox.com', 'www.roblox.com', 'auth.roblox.com'];
                displayAllowedDomains();
            } catch (e) {
                allowedDomains = ['roblox.com', 'www.roblox.com', 'auth.roblox.com'];
                displayAllowedDomains();
            }
        }
        
        function displayAllowedDomains() {
            allowedDomainsTags.innerHTML = allowedDomains.map(d => 
                `<span class="px-3 py-1 bg-green-900/30 text-green-300 text-xs rounded-full border border-green-500/30">✅ ${d}</span>`
            ).join('');
        }
        
        function validateUrl(url) {
            if (!url || url.trim() === '') {
                return { valid: false, error: 'URL is required' };
            }
            
            const urlLower = url.toLowerCase();
            
            if (!urlLower.startsWith('http://') && !urlLower.startsWith('https://')) {
                return { valid: false, error: 'URL must start with http:// or https://' };
            }
            
            const matchedDomain = allowedDomains.find(domain => urlLower.includes(domain.toLowerCase()));
            
            if (!matchedDomain) {
                return { valid: false, error: `Domain not allowed. Allowed: ${allowedDomains.join(', ')}` };
            }
            
            return { valid: true, matchedDomain };
        }
        
        targetUrl.addEventListener('input', () => {
            const result = validateUrl(targetUrl.value);
            if (!result.valid) {
                urlError.textContent = result.error;
                urlError.classList.add('text-red-400');
                urlError.classList.remove('text-green-400');
                generateBtn.disabled = true;
            } else {
                urlError.textContent = `✅ Valid domain: ${result.matchedDomain}`;
                urlError.classList.remove('text-red-400');
                urlError.classList.add('text-green-400');
                generateBtn.disabled = false;
            }
        });
        
        async function generateLink() {
            const url = targetUrl.value.trim();
            const validation = validateUrl(url);
            
            if (!validation.valid) {
                urlError.textContent = validation.error;
                showToast(validation.error, true);
                return;
            }
            
            generateBtn.disabled = true;
            generateBtn.innerHTML = '<span class="loading-dots">Generating</span>';
            
            try {
                const response = await fetch(`${API_BASE}/links`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ targetUrl: url, createdBy: 'generator' })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    lastGeneratedUrl = `${SITE_URL}/?code=${data.code}`;
                    generatedLink.textContent = lastGeneratedUrl;
                    resultSection.classList.remove('hidden');
                    showToast('✅ Link generated successfully!');
                } else {
                    throw new Error(data.error || 'Generation failed');
                }
            } catch (e) {
                console.error('Generate error:', e);
                showToast('Failed to generate link. Try again.', true);
            } finally {
                generateBtn.disabled = false;
                generateBtn.innerHTML = '✨ Generate Verification Link';
            }
        }
        
        generateBtn.addEventListener('click', generateLink);
        
        copyBtn.addEventListener('click', () => {
            if (lastGeneratedUrl) {
                navigator.clipboard?.writeText(lastGeneratedUrl)
                    .then(() => showToast('📋 Copied!'))
                    .catch(() => showToast('Press Ctrl+C to copy'));
            }
        });
        
        testBtn.addEventListener('click', () => {
            if (lastGeneratedUrl) {
                window.open(lastGeneratedUrl, '_blank');
            }
        });
        
        targetUrl.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !generateBtn.disabled) generateLink();
        });
        
        loadAllowedDomains();
    </script>
</body>
</html>
