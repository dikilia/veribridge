<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VeriBridge Admin · Login</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://i.imgur.com/HF0svxe.png">
    <link rel="apple-touch-icon" href="https://i.imgur.com/HF0svxe.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loading-dots::after {
            content: '';
            animation: dots 1.5s infinite;
        }
        @keyframes dots {
            0%,20%{content:'';} 40%{content:'.';} 60%{content:'..';} 80%,100%{content:'...';}
        }
        .shake {
            animation: shake 0.5s;
        }
        @keyframes shake {
            0%,100%{transform:translateX(0);}
            25%{transform:translateX(-5px);}
            75%{transform:translateX(5px);}
        }
    </style>
</head>
<body class="bg-black text-white">
    <div class="absolute inset-0 -z-10 h-full w-full bg-[radial-gradient(#0d0d0d_1px,transparent_1px)] [background-size:16px_16px]"></div>
    
    <div class="flex min-h-screen items-center justify-center p-4">
        <div class="w-full max-w-md">
            <div class="bg-black/30 backdrop-blur-sm border border-white/10 rounded-xl p-8 shadow-2xl">
                
                <div class="text-center mb-8">
                    <h1 class="text-2xl font-bold">
                        <span class="text-white">Veri</span><span class="text-purple-400">Bridge</span>
                    </h1>
                    <p class="text-white/50 text-sm mt-2">Admin Dashboard Access</p>
                </div>
                
                <!-- Password Login -->
                <div class="mb-6">
                    <label class="block text-sm font-medium text-white/80 mb-2">Admin Password</label>
                    <input type="password" id="password" 
                           class="w-full bg-zinc-900/80 border border-white/10 rounded-lg px-4 py-3 text-white"
                           placeholder="Enter admin password"
                           autocomplete="current-password">
                    <button id="loginBtn" class="w-full mt-3 bg-gradient-to-r from-blue-900 to-indigo-900 hover:from-blue-800 hover:to-indigo-800 py-3 rounded-lg font-medium border border-blue-400/30 transition">
                        Login with Password
                    </button>
                </div>
                
                <div class="relative my-6">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-white/10"></div>
                    </div>
                    <div class="relative flex justify-center text-xs">
                        <span class="bg-black/30 px-3 text-white/40">OR</span>
                    </div>
                </div>
                
                <!-- GitHub OAuth Login -->
                <a href="/api/auth/github" id="githubLoginBtn" class="w-full bg-[#24292e] hover:bg-[#2f363d] py-3 rounded-lg font-medium border border-white/10 transition flex items-center justify-center gap-3">
                    <svg class="w-5 h-5" viewBox="0 0 24 24" fill="white">
                        <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57C20.565 21.795 24 17.31 24 12c0-6.63-5.37-12-12-12z"/>
                    </svg>
                    Login with GitHub
                </a>
                
                <!-- Error Message -->
                <div id="errorMsg" class="text-red-400 text-sm text-center mt-4 min-h-[24px]"></div>
                
                <!-- Success Message -->
                <div id="successMsg" class="text-green-400 text-sm text-center mt-2 min-h-[24px]"></div>
                
                <div class="text-center mt-6">
                    <a href="/" class="text-xs text-white/30 hover:text-white/50 transition">
                        ← Back to VeriBridge
                    </a>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const API_BASE = '/api';
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');
        
        // ==================== CHECK FOR OAUTH CALLBACK ====================
        const urlParams = new URLSearchParams(window.location.search);
        const oauthToken = urlParams.get('token');
        const oauthUser = urlParams.get('user');
        const error = urlParams.get('error');
        const reason = urlParams.get('reason');
        
        console.log('[Login] URL Params:', { token: !!oauthToken, user: oauthUser, error, reason });
        
        // Handle OAuth callback errors
        if (error) {
            const errorMessages = {
                'github_denied': 'GitHub login was denied' + (reason ? `: ${decodeURIComponent(reason)}` : ''),
                'no_code': 'No authorization code received from GitHub',
                'token_exchange': 'Failed to exchange token with GitHub' + (reason ? `: ${decodeURIComponent(reason)}` : ''),
                'unauthorized_user': `GitHub user "${urlParams.get('user') || 'unknown'}" is not authorized for admin access`,
                'server_error': 'Server error during GitHub authentication. Please try again.'
            };
            errorMsg.textContent = errorMessages[error] || `GitHub login failed: ${error}`;
            console.error('[Login] OAuth Error:', error, reason);
        }
        
        // If OAuth token is present, save and redirect to dashboard
        if (oauthToken) {
            console.log('[Login] OAuth token received, saving...');
            localStorage.setItem('vb_admin_token', oauthToken);
            if (oauthUser) {
                localStorage.setItem('vb_admin_user', oauthUser);
            }
            successMsg.textContent = `✅ Logged in as ${oauthUser || 'Admin'}! Redirecting...`;
            
            // Redirect after short delay
            setTimeout(() => {
                window.location.replace('/dashboard');
            }, 1000);
        }
        
        // ==================== CHECK EXISTING SESSION ====================
        const existingToken = localStorage.getItem('vb_admin_token');
        const justLoggedOut = sessionStorage.getItem('just_logged_out');
        
        sessionStorage.removeItem('just_logged_out');
        
        if (existingToken && !justLoggedOut) {
            console.log('[Login] Existing token found, verifying...');
            
            fetch(`${API_BASE}/auth/verify`, {
                headers: { 'Authorization': `Bearer ${existingToken}` }
            })
            .then(res => res.json())
            .then(data => {
                if (data.valid) {
                    console.log('[Login] Token valid, redirecting to dashboard');
                    window.location.replace('/dashboard');
                } else {
                    console.log('[Login] Token invalid, clearing');
                    localStorage.removeItem('vb_admin_token');
                    localStorage.removeItem('vb_admin_user');
                }
            })
            .catch(() => {
                console.log('[Login] Token verification failed');
                localStorage.removeItem('vb_admin_token');
            });
        }
        
        // ==================== PASSWORD LOGIN ====================
        async function handlePasswordLogin() {
            const password = passwordInput.value.trim();
            
            if (!password) {
                errorMsg.textContent = 'Password is required';
                passwordInput.classList.add('shake');
                setTimeout(() => passwordInput.classList.remove('shake'), 500);
                return;
            }
            
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="loading-dots">Logging in</span>';
            errorMsg.textContent = '';
            
            try {
                console.log('[Login] Attempting password login...');
                const res = await fetch(`${API_BASE}/auth/password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                
                const data = await res.json();
                console.log('[Login] Password response:', data);
                
                if (data.success && data.token) {
                    localStorage.setItem('vb_admin_token', data.token);
                    localStorage.setItem('vb_admin_user', 'Admin');
                    successMsg.textContent = '✅ Login successful! Redirecting...';
                    setTimeout(() => {
                        window.location.replace('/dashboard');
                    }, 1000);
                } else {
                    errorMsg.textContent = data.error || 'Invalid password';
                    passwordInput.value = '';
                    passwordInput.focus();
                }
            } catch (e) {
                console.error('[Login] Error:', e);
                errorMsg.textContent = 'Network error. Please try again.';
            } finally {
                loginBtn.disabled = false;
                loginBtn.innerHTML = 'Login with Password';
            }
        }
        
        loginBtn.addEventListener('click', handlePasswordLogin);
        passwordInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handlePasswordLogin(); });
        passwordInput.focus();
    </script>
</body>
</html>
