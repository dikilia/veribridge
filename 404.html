<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Not Found</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', 'Segoe UI', sans-serif;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0f1e 0%, #0a1a2f 50%, #0b2b3b 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        h1 {
            font-size: 6rem;
            font-weight: 800;
            margin: 0;
            background: linear-gradient(135deg, #c084fc, #7c3aed);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        p {
            color: #9ab3cc;
            font-size: 1.2rem;
            margin: 1rem 0 2rem;
        }
        a {
            display: inline-block;
            background: linear-gradient(95deg, #2c5a7a, #1e3a5a);
            color: white;
            padding: 12px 28px;
            border-radius: 60px;
            text-decoration: none;
            font-weight: bold;
            border: 1px solid rgba(100, 200, 255, 0.4);
            transition: all 0.2s;
        }
        a:hover {
            background: linear-gradient(95deg, #3a6a8a, #2e4a6a);
            border-color: #8dd0ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <p>The page you're looking for doesn't exist or has been moved.</p>
        <a href="/">← Back to VeriBridge</a>
    </div>
</body>
</html>
